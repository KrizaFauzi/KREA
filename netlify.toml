# Netlify config — deploys the React/Vite frontend only.
# The FastAPI backend is hosted separately on Hugging Face Spaces; the frontend
# talks to it directly via VITE_API_BASE (set below), so streaming NDJSON is not
# proxied through Netlify (which would buffer/time out long responses).

[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  # URL of the HF Space backend (no trailing slash, no /api).
  # Replace if your Space URL differs (format: https://<user>-<space>.hf.space).
  VITE_API_BASE = "https://amadeoja-krea.hf.space"

# SPA fallback so client-side routes resolve to index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
